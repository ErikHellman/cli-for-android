name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # required for git describe and git log between tags

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: make test

      - name: Build release binaries
        run: make release

      - name: Generate checksums
        run: |
          cd dist
          # Aggregate checksum file
          sha256sum acli-* > checksums.txt
          # Individual .sha256 sidecars (acli update reads <asset>.sha256)
          for f in acli-*; do
            sha256sum "$f" | awk '{print $1}' > "$f.sha256"
          done

      - name: Generate release notes
        run: |
          PREV=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV" ]; then
            git log "${PREV}..HEAD" --oneline --no-merges > dist/notes.txt
          else
            git log --oneline --no-merges > dist/notes.txt
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file dist/notes.txt \
            dist/acli-* dist/checksums.txt
